<!DOCTYPE html>
<html lang="pt-br" xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho - Hamburgueria</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="carrinho.css">

<!--[if gte mso 9]><xml>
<mso:CustomDocumentProperties>
<mso:_ApprovalStatus msdt:dt="string">0</mso:_ApprovalStatus>
<mso:_ApprovalAssignedTo msdt:dt="string"></mso:_ApprovalAssignedTo>
<mso:_ApprovalRespondedBy msdt:dt="string"></mso:_ApprovalRespondedBy>
</mso:CustomDocumentProperties>
</xml><![endif]-->
</head>
<body>
    
    <div id="loading-overlay">
        <div class="spinner-border text-warning" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3 fs-5">Finalizando seu pedido...</p>
    </div>

    <header class="bg-dark text-white text-center py-5">
        <div class="container">
            <h1 class="display-4">Meu Carrinho 🛒</h1>
            <p class="lead">Confirme seus itens e finalize seu pedido.</p>
        </div>
    </header>

    <main class="container my-5">
        <div class="row g-5">
            <div class="col-lg-7">
                <div class="card p-4 shadow-lg">
                    <h2 class="text-center mb-4">Seu Pedido</h2>
                    
                    <div id="cart-items-container">
                        </div>

                    <div id="empty-cart-message" class="text-center my-5" style="display: none;">
                        <i class="fas fa-shopping-cart fa-3x text-muted mb-3"></i>
                        <h4>Seu carrinho está vazio.</h4>
                        <p class="text-muted">Volte ao cardápio para adicionar itens.</p>
                        <a href="indexr.html" class="btn btn-warning">Ver Cardápio</a>
                    </div>

                    <div id="order-summary" style="display: none;">
                        <hr class="my-4">
                        <div class="d-flex justify-content-between">
                            <h5 class="text-muted">Subtotal</h5>
                            <h5 id="subtotal">R$ 0,00</h5>
                        </div>
                        <div class="d-flex justify-content-between">
                            <p class="text-muted mb-0">Taxa de Entrega</p>
                            <p id="delivery-fee" class="mb-0">R$ 5,00</p>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between fw-bold fs-4">
                            <p>Total</p>
                            <p id="total-price">R$ 5,00</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div id="delivery-form-container" class="card p-4 shadow-lg" style="display: none;">
                    <h2 class="text-center mb-4">Dados de Entrega</h2>
                    <form id="formPedido">
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome Completo:</label>
                            <input type="text" id="nome" name="nome" class="form-control" placeholder="Digite seu nome completo" required>
                        </div>
                        <div class="mb-3">
                            <label for="telefone" class="form-label">Telefone (WhatsApp):</label>
                            <input type="tel" id="telefone" name="telefone" class="form-control" placeholder="(99) 99999-9999" required>
                        </div>
                        <div class="mb-4">
                            <label for="endereco" class="form-label">Endereço de Entrega:</label>
                            <input type="text" id="endereco" name="endereco" class="form-control" placeholder="Rua, número, bairro..." required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label d-block">Forma de Pagamento:</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" id="credito" name="pagamento" value="Cartão de Crédito" required>
                                <label class="form-check-label" for="credito">Cartão de Crédito</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" id="debito" name="pagamento" value="Cartão de Débito">
                                <label class="form-check-label" for="debito">Cartão de Débito</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" id="pix" name="pagamento" value="Pix">
                                <label class="form-check-label" for="pix">Pix</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" id="dinheiro" name="pagamento" value="Dinheiro">
                                <label class="form-check-label" for="dinheiro">Dinheiro</label>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="observacoes" class="form-label">Observações:</label>
                            <textarea id="observacoes" name="observacoes" rows="3" class="form-control" placeholder="Ponto da carne, tirar cebola, etc..."></textarea>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning btn-lg">
                                <i class="fab fa-whatsapp me-2"></i> Finalizar Pedido via WhatsApp
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const cartItemsContainer = document.getElementById('cart-items-container');
        const emptyCartMessage = document.getElementById('empty-cart-message');
        const orderSummary = document.getElementById('order-summary');
        const deliveryFormContainer = document.getElementById('delivery-form-container');
        const subtotalEl = document.getElementById('subtotal');
        const deliveryFeeEl = document.getElementById('delivery-fee');
        const totalPriceEl = document.getElementById('total-price');
        const form = document.getElementById('formPedido');
        const loadingOverlay = document.getElementById('loading-overlay');

        const DELIVERY_FEE = 5.00;
        
        const formatCurrency = (value) => value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        const updateCart = () => {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            cartItemsContainer.innerHTML = '';

            if (cart.length === 0) {
                emptyCartMessage.style.display = 'block';
                orderSummary.style.display = 'none';
                deliveryFormContainer.style.display = 'none';
            } else {
                emptyCartMessage.style.display = 'none';
                orderSummary.style.display = 'block';
                deliveryFormContainer.style.display = 'block';
                
                cart.forEach(item => {
                    const itemElement = document.createElement('div');
                    itemElement.className = 'd-flex align-items-center mb-3 cart-item';
                    itemElement.innerHTML = `
                        <img src="${item.image}" alt="${item.name}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">
                        <div class="flex-grow-1 ms-3">
                            <h6 class="mb-1">${item.name}</h6>
                            <p class="text-muted mb-0">${formatCurrency(item.price)}</p>
                        </div>
                        <div class="d-flex align-items-center">
                            <button class="btn btn-outline-secondary btn-sm quantity-change" data-id="${item.id}" data-change="-1">-</button>
                            <span class="mx-2">${item.quantity}</span>
                            <button class="btn btn-outline-secondary btn-sm quantity-change" data-id="${item.id}" data-change="1">+</button>
                        </div>
                        <button class="btn btn-danger btn-sm ms-3 remove-item" data-id="${item.id}">&times;</button>
                    `;
                    cartItemsContainer.appendChild(itemElement);
                });

                updateTotal();
                addEventListeners();
            }
        };
        
        const updateTotal = () => {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const subtotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            const total = subtotal + DELIVERY_FEE;

            subtotalEl.textContent = formatCurrency(subtotal);
            deliveryFeeEl.textContent = formatCurrency(DELIVERY_FEE);
            totalPriceEl.textContent = formatCurrency(total);
        };

        const addEventListeners = () => {
            document.querySelectorAll('.quantity-change').forEach(button => {
                button.addEventListener('click', (e) => {
                    const id = e.target.dataset.id;
                    const change = parseInt(e.target.dataset.change);
                    changeQuantity(id, change);
                });
            });

            document.querySelectorAll('.remove-item').forEach(button => {
                button.addEventListener('click', (e) => {
                    const id = e.target.dataset.id;
                    removeItem(id);
                });
            });
        };

        const changeQuantity = (id, change) => {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCart();
        };

        const removeItem = (id) => {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart = cart.filter(item => item.id !== id);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCart();
        };

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            loadingOverlay.style.display = 'flex';

            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const formData = new FormData(form);
            
            const clientName = formData.get('nome');
            const clientAddress = formData.get('endereco');
            const paymentMethod = formData.get('pagamento');
            const observations = formData.get('observacoes');
            const clientPhone = '5521999999999'; // Substitua pelo número do WhatsApp da loja

            let orderText = `*🍔 NOVO PEDIDO - HAMBURGUERIA DELICIOSA 🍔*\n\n`;
            orderText += `*Cliente:* ${clientName}\n`;
            orderText += `*Endereço:* ${clientAddress}\n\n`;
            orderText += `*📝 ITENS DO PEDIDO:*\n`;
            
            cart.forEach(item => {
                orderText += `• ${item.quantity}x ${item.name} - ${formatCurrency(item.price * item.quantity)}\n`;
            });
            
            orderText += `\n*Subtotal:* ${subtotalEl.textContent}\n`;
            orderText += `*Taxa de Entrega:* ${deliveryFeeEl.textContent}\n`;
            orderText += `*TOTAL:* *${totalPriceEl.textContent}*\n\n`;
            orderText += `*Forma de Pagamento:* ${paymentMethod}\n`;
            
            if (observations) {
                orderText += `*Observações:* ${observations}\n`;
            }

            const whatsappUrl = `https://wa.me/+5521969816982?text=${encodeURIComponent(orderText)}`;
            
            setTimeout(() => {
                window.open(whatsappUrl, '_blank');
                loadingOverlay.style.display = 'none';
                localStorage.removeItem('cart'); // Limpa o carrinho após o pedido
                updateCart();
            }, 1500);
        });

        updateCart();
    });
    </script>
</body>
</html>
